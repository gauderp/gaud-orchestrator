# Gaud Orchestrator — Docker Compose
#
# Usage:
#   cp .env.example .env   # edit with your tokens
#   docker compose up -d --build
#
# Authentication:
#   - GitHub: via GITHUB_TOKEN env var (PAT or fine-grained token)
#   - Claude: via ANTHROPIC_API_KEY (for claude-api provider)
#            OR mounted ~/.claude (for claude-cli provider on same machine)
#   - Other LLMs: via respective API keys

services:
  gaud-orchestrator:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - gaud-data:/app/data
      - ./agents:/app/agents
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/orchestrator.db
      - AGENTS_DIR=/app/agents
      - ATTACHMENTS_DIR=/app/data/attachments
      - REPOS_DIR=/app/data/repos
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # GitHub — used by gh CLI and git for clone/push/PR
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Gaud Orchestrator}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-orchestrator@gaud.dev}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Gaud Orchestrator}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-orchestrator@gaud.dev}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      # LLM API keys (configure the ones you use)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Slack (optional)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gaud-data:
